server.port=8080
spring.application.name=gateway-service

# Eureka Config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ROUTES CONFIGURATION
# Auth Service Route
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# Quantity Service Route (With Security Filter)
spring.cloud.gateway.routes[1].id=quantity-service
spring.cloud.gateway.routes[1].uri=lb://QUANTITY-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/quantities/**

spring.cloud.gateway.routes[1].filters[0]=AuthenticationFilter